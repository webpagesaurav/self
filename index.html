<script>
async function downloadVCard(name, column) {
  const sheetURL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQtqR72Vrk_F-lsUDeigVpbR03RbTpX00nr1kyQp_cVq-xiwTFWZMYNR5fCe3F0F-mnJ9K28WWy0QXr/pub?gid=1404891780&single=true&range=${column}1:${column}&output=csv`;

  try {
    const response = await fetch(sheetURL);
    const data = await response.text();
    const phoneNumbers = data.split("\n").map(n => n.trim()).filter(Boolean);

    const vCard = `BEGIN:VCARD
VERSION:3.0
N:${name};;;;
FN:${name}
${phoneNumbers.map(num => `TEL;TYPE=CELL:${num}`).join("\n")}
END:VCARD`;

    const blob = new Blob([vCard], { type: "text/vcard;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${name}.vcf`;
    a.click();
    URL.revokeObjectURL(a.href);

  } catch (err) {
    console.error("Error fetching phone numbers:", err);
  }
}
</script>
