<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css?family=Comic+Neue" rel="stylesheet">
  <title>Multi Bank Dynamic Card</title>
  <style>
    body { font-family:'Comic Neue';padding: 20px; }
    .card {
      border: 1px solid #ccc;
      padding: 15px;
      width: 320px;
      border-radius: 12px;
    }
    .field {
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section {
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
      font-weight: bold;
    }
    .sub-section {
      margin-top: 10px;
      padding: 8px;
      border: 1px dashed #ccc;
      border-radius: 8px;
    }
    button {
      padding: 4px 8px;
      cursor: pointer;
    }
    a.phone-link {
      display: inline-block;
      margin: 10px 0;
      text-decoration: none;
      color: blue;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="app"></div>
<p id="demo"></p>
<script>
const data = {
  name: "SAURAV KUMAR",
  phone: "9504952797",
  
  upi: [
    "offlinesaurav-6@okaxis",
    "offlinesaurav@okhdfcbank"
  ],
  banks: [
    
    {
      name: "Federal Bank",
      account: "55550109968048",
      ifsc: "FDRL0005555",
      upi: "offlinesaurav-6@okaxis"
    }
    
    
  ]
};

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert(" You Copied: " + text);
}

function createField(label, value, copyable = true) {
  const div = document.createElement("div");
  div.className = "field";

  const span = document.createElement("span");
  span.textContent = label + ": " + value;
  div.appendChild(span);

  if (copyable) {
    const btn = document.createElement("button");
    btn.textContent = "Copy";
    btn.onclick = () => copyText(value);
    div.appendChild(btn);
  }

  return div;
}

function createSection(title) {
  const div = document.createElement("div");
  div.className = "section";
  div.textContent = title;
  return div;
}

function render() {
  const app = document.getElementById("app");

  const card = document.createElement("div");
  card.className = "card";

  // Name
  const title = document.createElement("h3");
  title.textContent = data.name;
  card.appendChild(title);

  // Clickable phone number using innerHTML
  card.innerHTML += `<a class="phone-link" href="tel:${data.phone}">${data.phone}</a> | <a class="phone-link" href="//wa.me/91${data.phone}">Whatsapp</a> | <a class="phone-link"href='https://gpay.app.goo.gl/pay-T8wH7S8sEGh'>Google-pay</a>
  <select id="mySelect" onchange="myFunction()">
  <option value="1OcLj8-y3jGCVF5d1hR-ptl-ISgWrmv-5">Audi</option>
  <option value="1RJZd4FUhxOoF7WZOkQZM5QUurdMLEwfx">BMW</option>
  
</select>


  
  `;

  // UPI Section
  card.appendChild(createSection("💳 UPI IDs"));
  data.upi.forEach((upi, index) => {
    card.appendChild(createField("UPI " + (index + 1), upi));
  });

  // Bank Section
  card.appendChild(createSection("🏦 Bank Details"));
  data.banks.forEach((bank) => {
    const sub = document.createElement("div");
    sub.className = "sub-section";
    sub.appendChild(createField("Bank", bank.name, false));
    
    sub.appendChild(createField("A/c", bank.account));
    sub.appendChild(createField("IFSC", bank.ifsc));
    sub.appendChild(createField("UPI", bank.upi));
    card.appendChild(sub);
  });

  app.appendChild(card);
}

render();
</script>
  
  <script>
function myFunction() {
  var x = document.getElementById("mySelect").value;
  document.getElementById("demo").innerHTML = "<img src='https://lh3.googleusercontent.com/d/" + x+"'>";
}
</script>

</body>
</html>
