<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
.card-container {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  margin: 50px 0;
}

.flip-card {
  background-color: transparent;
  width: 300px;
  height: 300px;
  perspective: 1000px;
}

.flip-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  text-align: center;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.flip-card:hover .flip-card-inner {
  transform: rotateY(180deg);
}

.flip-card-front,
.flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
}

.flip-card-front {
  background-color: #bbb;
}

.flip-card-back {
  background-color: #2980b9;
  color: white;
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
  font-size: 22px;
}
</style>

</head>
<body>

<div class="card-container" id="cardContainer"></div>

<script>
// Array of cards with front and back images
const cards = [
  {
    front: "1cr06m3JZup_I4JACRNHkN2hPcWAeYsNm",
    back: "1RJZd4FUhxOoF7WZOkQZM5QUurdMLEwfx"
  },
  {
    front: "198MeMIWY9cB_alJJYVbpS1OwzBWf-yDp",
    back: "1FGNC6PlnIZ-GdkONIk2L-2CxoB4PyXHA"
  }
  // Add more cards here
];

const container = document.getElementById("cardContainer");

// Generate HTML dynamically
cards.forEach(card => {
  const flipCard = document.createElement("div");
  flipCard.className = "flip-card";
  
  flipCard.innerHTML = `
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <img src="https://lh3.googleusercontent.com/d/${card.front}" alt="Avatar" style="width:300px;height:300px;">
      </div>
      <div class="flip-card-back">
        <img src="https://lh3.googleusercontent.com/d/${card.back}" style="width:100%;height:800px;">
      </div>
    </div>
  `;
  
  container.appendChild(flipCard);
});
</script>

</body>
</html>
