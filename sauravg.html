<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css?family=Comic+Neue" rel="stylesheet">



  
<style>

body{
  font-family:'Comic Neue';
  margin:0;
}

/* GRID */
#drive{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
  gap:15px;
  padding:20px;
  justify-items:center;
}

/* CARD */
.flip-card{
  width:300px;
  height:200px;
  perspective:1000px;
}

.flip-inner{
  width:100%;
  height:100%;
  position:relative;
  transition:transform .6s;
  transform-style:preserve-3d;
}

.flip-card:hover .flip-inner{
  transform:rotateY(180deg);
}

.flip-front,
.flip-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.flip-front img{
  width:100%;
  height:100%;
}

/* BACK */
.flip-back{
  transform:rotateY(180deg);
  background:#333;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:6px;
  padding:10px;
  text-align:center;
}

.copy{
  cursor:pointer;
  background:#555;
  padding:4px 8px;
  border-radius:4px;
}

a{
  color:#00e0ff;
  text-decoration:none;
}

</style>
</head>
<body>

<div id="drive"></div>

<script>

function copyText(t){
  navigator.clipboard.writeText(t);
}

document.addEventListener("DOMContentLoaded",()=>{

const [id,gid]=prompt("password p hai").trim().split(':');

const base=r=>`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&tq&gid=${gid}&range=${r}`;

const tables=[

{
id:"drive",
range:"A2:Z20",
row:c=>{

const v=i=>c[i]?.f||c[i]?.v||'';

return v(6)?`

<div class="flip-card">
<div class="flip-inner">

<div class="flip-front">

<img src="https://lh3.googleusercontent.com/d/${v(1).split("/d/")[1].split("/")[0]}">

</div>

<div class="flip-back">

${v(4)?`<span class="copy" onclick="copyText('${v(4)}')">${v(4)}</span>`:""}
${v(5)?`<span class="copy" onclick="copyText('${v(5)}')">${v(5)}</span>`:""}
${v(6)?`<span class="copy" onclick="copyText('${v(6)}')">${v(6)}</span>`:""}
${v(8)?`<span class="copy" onclick="copyText('${v(8)}')">${v(8)}</span>`:""}
${v(9)?`<span class="copy" onclick="copyText('${v(9)}')">${v(9)}</span>`:""}
${v(10)?`<span class="copy" onclick="copyText('${v(10)}')">${v(10)}</span>`:""}

${v(2)?`<a href="${v(2)}">Download</a>`:""}
${v(3)?`<a href="${v(3)}" target="_blank">Open</a>`:""}

</div>

</div>
</div>

`:``;

}
},

{
id:"drive",
range:"J1:K1",
row:c=>{
const v=i=>c[i]?.f||c[i]?.v||'';
return v(0)?`${v(0)}${v(1)}`:``;
}
}

];


/* FETCH DATA */

tables.forEach(({id,range,row})=>{

const container=document.getElementById(id);

fetch(base(range))
.then(r=>r.text())
.then(d=>{

const rows=JSON.parse(d.slice(47,-2)).table.rows;

let html="";

rows.forEach(r=>html+=row(r.c));

container.innerHTML+=html;

});

});

});

</script>

</body>
</html>
