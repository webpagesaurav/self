<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css?family=Comic+Neue" rel="stylesheet">

<style>

body{
font-family:'Comic Neue';
margin:0;
background:#f4f4f4;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
padding:15px;
}

/* CARD */

.flip-card{
width:100%;
height:200px;
perspective:1000px;
}

.flip-inner{
position:relative;
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
cursor:pointer;
}

.flip-card.flipped .flip-inner{
transform:rotateY(180deg);
}

.flip-front,.flip-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:10px;
overflow:hidden;
}

/* FRONT */

.flip-front img{
width:100%;
height:100%;

}

/* BACK */

.flip-back{
background:#fff;
transform:rotateY(180deg);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:8px;
font-size:14px;
}

/* COPY BUTTON */

.copy{
background:#EDE4E4;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.copy:hover{
background:#ccc;
}

/* OPEN LINK */

.open{
text-decoration:none;
background:#444;
color:white;
padding:6px 12px;
border-radius:5px;
}

</style>

</head>

<body>

<div id="drive" class="grid">Loading...</div>

<script>

/* Flip card */

function flipCard(el){

document.querySelectorAll(".flip-card").forEach(card=>{

if(card!==el){
card.classList.remove("flipped");
}

});

el.classList.toggle("flipped");

}

/* Copy text */

function copyText(t){

navigator.clipboard.writeText(t);

}

/* Load Sheet */

document.addEventListener("DOMContentLoaded",()=>{

const input=prompt("SPREADSHEETID|GID|RANGE");

if(!input) return;

const [id,gid,range]=input.trim().split("|");

const url=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&tq&gid=${gid}&range=${range}`;

fetch(url)

.then(r=>r.text())

.then(data=>{

const rows=JSON.parse(data.substring(47).slice(0,-2)).table.rows;

let html="";

rows.forEach(r=>{

const c=r.c||[];

const v=i=>c[i]?.f||c[i]?.v||"";

if(!v(1)) return;

const img=v(1).match(/\/d\/([^/]+)/)?.[1]||"";

html+=`

<div class="flip-card" onclick="flipCard(this)">

<div class="flip-inner">

<div class="flip-front">

<img src="https://lh3.googleusercontent.com/d/${img}" oncontextmenu="return false;">

</div>

<div class="flip-back">

${v(4)?`<span class="copy" onclick="copyText('${v(4)}');event.stopPropagation();">${v(4)}</span>`:""}

${v(5)?`<span class="copy" onclick="copyText('${v(5)}');event.stopPropagation();">${v(5)}</span>`:""}
${v(6)?`<span class="copy" onclick="copyText('${v(6)}');event.stopPropagation();">${v(6)}</span>`:""}
 
${v(7)?`<span class="copy" onclick="copyText('${v(7)}');event.stopPropagation();">${v(7)}</span>`:""}
${v(8)?`<span class="copy" onclick="copyText('${v(8)}');event.stopPropagation();">${v(8)}</span>`:""}

  ${v(2)&&`<a href="${v(2)}">Download</a>`}${v(3)&&`<a href="${v(3)}" target="_blank">Open</a>`}

${v(9)?`<span class="copy" onclick="copyText('${v(9)}');event.stopPropagation();">${v(9)}</span>`:""}
${v(10)?`<span class="copy" onclick="copyText('${v(10)}');event.stopPropagation();">${v(10)}</span>`:""}
 
 

</div>

</div>

</div>

`;

});

document.getElementById("drive").innerHTML=html;

});

});

</script>

</body>
</html>
