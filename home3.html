<link href="https://fonts.googleapis.com/css?family=Comic+Neue" rel="stylesheet">

<style>
body {
    font-family: 'Comic Neue';font-size: 22px;
}
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 400px;
  }

  th, td {
    border: 1px solid #000;
    padding: 8px;
    text-align: left;
    white-space: nowrap;
  }

  th {
    background-color: #F88379;
    color: #fff;
  }


.round-img {
  width: 200px;
  height: 200px;
}

</style>
<script>
  
  
  

  function copyText(t) {
    navigator.clipboard.writeText(t);
  }

document.addEventListener("DOMContentLoaded", () =>{
    const id= prompt("s").trim();
 
          
    const base = r => `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&tq&gid=516462335&range=${r}`;

  
    const tables = [ 
  
          
        
      
      
 
   
   
  

   
   {
        
        id: "drive",
        range: "A51:Z60",
        headers: ['', ''],
        row: c => {
          const v = i => c[i]?.f || c[i]?.v || '';
          return `${v(2)
  ? `<a href="${v(1)}"target="_blank"onclick="navigator.clipboard.writeText('${v(3)}')"><img src="https://lh3.googleusercontent.com/d/${v(2).match(/\/d\/([^/]+)/)?.[1] || ""}"class="round-img"oncontextmenu="return false;"></a>&nbsp&nbsp;`
  : ``}`;
        }
      },
   
  
   
   

      
 
      
      
      {
        id: "insurance",
        range: "A32:Z35",
        headers: ["Name", "Policy_No | Amount | Date Of Birth | Due-Month",""],
        row: c => {
          const v = i => c[i]?.f || c[i]?.v || '';
          return `<tr><td>${v(0)}</td><td><span class="copy" onclick="copyText('${v(1)}')">${v(1)}</span>  - ${v(2)} - <span class="copy" onclick="copyText('${v(3)}')">${v(3)}</span> - ${v(4)}</td><td>${v(5)}</td></tr>`;
        }
      },
      
      
      
   
      
   
   {
        id: "spassword",
        range: "A51:Z100",
        headers: ["Name", "Username", "Password", "pro","hint"],
        row: c => {
          const v = i => c[i]?.f || c[i]?.v || '';
          return `<tr><td><a href="${v(1)}"target="_blank"onclick="navigator.clipboard.writeText('${v(2)}')">${v(0)}</a></td>
          
          <td><span class="copy" onclick="copyText('${v(3)}')">${v(3)}</span></td>
          <td><span class="copy" onclick="copyText('${v(4)}')">${v(4)}</span></td>
          <td><span class="copy" onclick="copyText('${v(5)}')">${v(5)}</span></td>
          </tr>`;
        }
      }

        


          
   
   
   
   
   
      
    








];

// Auto-create containers and fetch data
    tables.forEach(({id,range,headers,row }) => {
      const container = document.createElement("div");
      container.id = id;
      container.textContent = "Loading...";
      document.body.appendChild(container);

      fetch(base(range))
        .then(r => r.text())
        .then(d => {
          const rows = JSON.parse(d.slice(47, -2)).table.rows;
          let html = `<table><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
          rows.forEach(r => html += row(r.c));
          container.innerHTML = html + '</table></br>';
        });
    });
  });
  
  
</script>
