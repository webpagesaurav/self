
<script>
  
  

  function copyText(t) {
    navigator.clipboard.writeText(t);
  }

document.addEventListener("DOMContentLoaded", () => {
    
    const st=prompt("s").trim();
          
    const base = r => `https://docs.google.com/spreadsheets/d/${st}/gviz/tq?tqx=out:json&tq&gid=516462335&range=${r}`;

  
    
 const tables = [ 
   
   
   
   {
        id: "spassword",
        range: "A52:Z60",
        headers: ["Name", "Username", "Password", "pro","hint"],
        row: c => {
          const v = i => c[i]?.f || c[i]?.v || '';
          return `<tr><td><a href="${v(1)}"target="_blank"onclick="navigator.clipboard.writeText('${v(2)}')">${v(0)}</a></td>
          <td><span class="copy" onclick="copyText('${v(2)}')">${v(2)}</span></td>
          <td><span class="copy" onclick="copyText('${v(3)}')">${v(3)}</span></td>
          <td><span class="copy" onclick="copyText('${v(4)}')">${v(4)}</span></td><td>${v(5)}</td></tr>`;
        }
      }
   
   
   
   
   
  

   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
   

   
   
   
   
   
     
   ];

    
    
    
    
// Auto-create containers and fetch data
    tables.forEach(({id,range,headers,row }) => {
      const container = document.createElement("div");
      container.id = id;
      container.textContent = "Loading...";
      document.body.appendChild(container);

      fetch(base(range))
        .then(r => r.text())
        .then(d => {
          const rows = JSON.parse(d.slice(47, -2)).table.rows;
          let html = `<table><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
          rows.forEach(r => html += row(r.c));
          container.innerHTML = html + '</table></br>';
        });
    });
  });

  
  
  


 

</script>
