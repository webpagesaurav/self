<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css?family=Comic+Neue" rel="stylesheet">


<style>

body{
  font-family:'Comic Neue';
  margin:0;
}

/* GRID */
#drive{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
  padding:20px;
  justify-items:center;
}

/* CARD */
.flip-card{
  width:300px;
  height:200px;
  perspective:1000px;
}

.flip-inner{
  width:100%;
  height:100%;
  position:relative;
  transition:transform .6s;
  transform-style:preserve-3d;
}

.flip-card:hover .flip-inner{
  transform:rotateY(180deg);
}

.flip-front,
.flip-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.flip-front img{
  width:100%;
  height:100%;
}

/* BACK */
.flip-back{
  transform:rotateY(180deg);
  background:#333;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:6px;
  padding:10px;
  text-align:center;
}

.copy{
  cursor:pointer;
  background:#555;
  padding:4px 8px;
  border-radius:4px;
}

a{
  color:#00e0ff;
  text-decoration:none;
}

</style>
</head>
<body>

<div id="drive"></div>
<div id='driv'></div>

<script>

function copyText(t){
  navigator.clipboard.writeText(t);
}

document.addEventListener("DOMContentLoaded",()=>{

const [id,gid]=prompt("password p hai").trim().split(':');

const base=r=>`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&tq&gid=${gid}&range=${r}`;

const tables=[

{
id:"drive",
range:"A2:Z50",
hint: "",

row:c=>{

const v=i=>c[i]?.f||c[i]?.v||'';

return v(1)?`
<div class="flip-card">
<div class="flip-inner">

<div class="flip-front">

<img src="https://lh3.googleusercontent.com/d/${v(1).split("/d/")[1].split("/")[0]}"class="round-img">

</div>

<div class="flip-back">
${v(2)?`<a href="https://wa.me/91${v(2)}">${v(2)}</a>`:""}
${v(3)?`<a href="https://wa.me/91${v(3)}">${v(3)}</a>`:""}
${v(4)?`<a href="https://wa.me/91${v(4)}">${v(4)}</a>`:""}


</div>

</div>
</div>

`:``;

}
},
{
      
        id: "driv",
        range: "A1:Z5",
        hint: "</br></br>",
        headers: ['', ''],
        row: c => {
          const v = i => c[i]?.f || c[i]?.v || '';
          return `${v(0)
  ? `${v(0)}${v(1)}`
  : ``

}`;
        }
      }

                                                           


];


/* FETCH DATA */

tables.forEach(({hint,id,range,row})=>{

const container=document.getElementById(id);

fetch(base(range))
.then(r=>r.text())
.then(d=>{

const rows=JSON.parse(d.slice(47,-2)).table.rows;

let html="";

rows.forEach(r=>html+=row(r.c));

container.innerHTML+=`${hint}${html}`;

});

});

});

</script>

</body>
</html>
