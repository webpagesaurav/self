
<link href="https://fonts.googleapis.com/css?family=Comic+Neue" rel="stylesheet">

<style>
body {
    font-family: 'Comic Neue';font-size: 22px;
}
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 400px;
  }

  th, td {

  th {
    background-color: #F88379;
    color: #fff;

.round-img {
  width: 200px;
  height: 200px;
}

</style>
<script>
  
  
  

  function copyText(t) {
    navigator.clipboard.writeText(t);
  }

document.addEventListener("DOMContentLoaded", () => {
const id= prompt("s password hai").trim();
 
          
    const base = r => `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&tq&gid=${r}`;

  
    const tables = [ 
  
           
            
                
                 
      
      
            
      
      
 
   
      
      

   {
                hint:"* red colour indicates username/id/policy <div class='gallery'>",
        id: "caspasresult",
        range: "657844466&range=A11:Z50",
        headers: [],
        row: c => {
          const v = i => c[i]?.f || c[i]?.v || '';
          return `
<div class="gallery-item">
  <a target="_blank" href="${v(2)}"onclick="copyText('${v(4)}')"><img src="https://lh3.googleusercontent.com/d/${v(1).match(/\/d\/([^/]+)/)?.[1] || ""}"width="600" height="400">
   
  </a>
  <div class="desc">
  
  
  
  
  ${v(3) ? `<span style="color:black">${v(3)}</span></br>` : ''}
  
 ${v(4) ? `<span style="color:red">${v(4)}</span>` : ''}
 
  ${v(5) ? `<span style="color:red">${v(5)}</span>` : ''}
 
 
  ${v(6) ? `<span style="color:red">${v(6)}</span>` : ''}
 
  ${v(7) ? `<span style="color:red">${v(7)}</span>` : ''}
 
  
  
  
  
  
  </div>
</div>`;
        }
      },
      
      
      
      
      
      
      
      
      
  


   
   

  
   
        
      
   

 
      
      
   
      
      
      
      
   
      
   
   
   
      
    
    


      
    
      
      






];

// Auto-create containers and fetch data
    tables.forEach(({hint,id,range,headers,row }) => {
      const container = document.createElement("div");
      container.id = id;
      container.textContent = "Loading...";
      document.body.appendChild(container);

      fetch(base(range))
        .then(r => r.text())
        .then(d => {
          const rows = JSON.parse(d.slice(47, -2)).table.rows;
          let html = `${hint}<br><table><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
          rows.forEach(r => html += row(r.c));
          container.innerHTML = html + '</table></br></br>';
        });
    });
  });
  
  
</script>
