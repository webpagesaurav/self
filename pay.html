<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css?family=Comic+Neue" rel="stylesheet">
  <title>Multi Bank Dynamic Card</title>
  <style>
    body { font-family:'Comic Neue';padding: 20px; }
    .card {
      border: 1px solid #ccc;
      padding: 15px;
      width: 320px;
      border-radius: 12px;
    }
    .field {
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section {
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
      font-weight: bold;
    }
    .sub-section {
      margin-top: 10px;
      padding: 8px;
      border: 1px dashed #ccc;
      border-radius: 8px;
    }
    button {
      padding: 4px 8px;
      cursor: pointer;
    }
    a.phone-link {
      display: inline-block;
      margin: 10px 0;
      text-decoration: none;
      color: blue;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="app"></div>

 <a href='https://maps.app.goo.gl/q8MYYD9qQPMAUWRCA'><img width="48" height="48" src="https://img.icons8.com/color/48/google-maps.png" alt="google-maps"/></a>
  
  <a href='//wa.me/919504952797'><img width="48" height="48" src="https://img.icons8.com/color/48/whatsapp--v1.png" alt="whatsapp--v1"/></a>
  
  
  
  
<script>
  
  
const data = {
  name: "SAURAV KUMAR",
  phone: "9504952797",
  
  
  banks: [
  
    
    
    
    
    {
      
      name: "Federal Bank",
      account: "55550109968048",
      ifsc: "FDRL0005555",
      upi: "offlinesaurav-6@okaxis",
      statebank:"iasaurav@ybl",
      
    }
    
    
  ]
  
  
  
};

 
function copyText(text) {
  navigator.clipboard.writeText(text);
  alert(" You Copied: " + text);
}

function createField(label, value, copyable = true) {
  const div = document.createElement("div");
  div.className = "field";

  const span = document.createElement("span");
  span.textContent = label + ": " + value;
  div.appendChild(span);

  if (copyable) {
    const btn = document.createElement("button");
    btn.textContent = "Copy";
    btn.onclick = () => copyText(value);
    div.appendChild(btn);
  }

  return div;
}

function createSection(title) {
  const div = document.createElement("div");
  div.className = "section";
  div.textContent = title;
  return div;
}

function render() {
  const app = document.getElementById("app");

  const card = document.createElement("div");
  card.className = "card";

  // Name
  const title = document.createElement("h3");
  title.textContent = data.name;
  card.appendChild(title);

  // Clickable phone number using innerHTML
  card.innerHTML += `<a class="phone-link" href="tel:${data.phone}">${data.phone}</a> | <a class="phone-link"href='https://gpay.app.goo.gl/pay-T8wH7S8sEGh'>Google-pay</a>`;
  
 

 

  // Bank Section
  card.appendChild(createSection("🏦 Bank Details"));
  data.banks.forEach((bank) => {
    const sub = document.createElement("div");
    sub.className = "sub-section";
    
    sub.appendChild(createField("Bank", bank.name, false));
    
    sub.appendChild(createField("A/c", bank.account));
    sub.appendChild(createField("IFSC", bank.ifsc));
    
    sub.appendChild(createField("UPI", bank.upi));
    
    sub.appendChild(createField("statebank", bank.statebank));
    card.appendChild(sub);
  });

  app.appendChild(card);
  
  
   
  
  
  
}

render();
</script>
  
 

</body>
</html>


<!DOCTYPE html>
<html>
<head>
  <title>Dynamic vCard Generator</title>
</head>
<body>

<a href="#" onclick="downloadVCard()"><img src="https://lh3.googleusercontent.com/d/1tZxf9LCBOSz_nY1DJjf24qm1APOi_cUP"></a>

<script>
async function downloadVCard() {
  const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtqR72Vrk_F-lsUDeigVpbR03RbTpX00nr1kyQp_cVq-xiwTFWZMYNR5fCe3F0F-mnJ9K28WWy0QXr/pub?gid=1404891780&single=true&range=C1:C&output=csv";

  const name = "Saurav";

  try {
    // Fetch CSV data
    const response = await fetch(sheetURL);
    const data = await response.text();

    // Convert CSV → array (split by new line)
    const phoneNumbers = data.split("\n").map(num => num.trim()).filter(num => num);

    // Start vCard
    let vCard = `BEGIN:VCARD
VERSION:3.0
N:${name};;;;
FN:${name}
`;

    // Add numbers
    phoneNumbers.forEach(num => {
      vCard += `TEL;TYPE=CELL:${num}\n`;
    });

    vCard += "END:VCARD";

    // Download file
    const blob = new Blob([vCard], { type: "text/vcard;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `${name}.vcf`;
    a.click();

    URL.revokeObjectURL(url);

  } catch (error) {
    console.error("Error fetching phone numbers:", error);
  }
}
</script>

</body>
</html>
