<script>

document.addEventListener("DOMContentLoaded", () => {

 const id=prompt("s").trim();
          
    const base = r => `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&tq&gid=${r}`;

  
    const tables = [ 
  
           
            
                



{

        id: "caspasresult",
        range: "897068825&range=A1:Z20",
        headers: [],
        row: c => {
          const v = i => c[i]?.f || c[i]?.v || '';
          return `
          
           ${v(1) ? `

           
           
<div class="gallery-item">
  <a target="_blank" href="https://drive.google.com/uc?export=download&id=${v(1)}"><img src="https://lh3.googleusercontent.com/d/${v(1)}"width="600" height="400">

  ${v(1) ? `
    <a target="_blank" href="https://drive.google.com/uc?export=download&id=${v(1)}"style="color:green">${v(0)}</a>` : ''}
  
  
  
  
  ` : ''}

</div>`;
        }

];

// Auto-create containers and fetch data
    tables.forEach(({hint,id,range,headers,row }) => {
      const container = document.createElement("div");
      container.id = id;
      container.textContent = "Loading...";
      document.body.appendChild(container);

      fetch(base(range))
        .then(r => r.text())
        .then(d => {
          const rows = JSON.parse(d.slice(47, -2)).table.rows;
          let html = `${hint}<br><table><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
          rows.forEach(r => html += row(r.c));
          container.innerHTML = html + '</table></br>';
        });
    });
  });
  
  
</script>
