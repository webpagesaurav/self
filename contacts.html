<!DOCTYPE html>
<html>
<head>
  <title>Dynamic vCard Generator</title>
</head>
<body>

<script>
async function downloadVCard() {
  const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtqR72Vrk_F-lsUDeigVpbR03RbTpX00nr1kyQp_cVq-xiwTFWZMYNR5fCe3F0F-mnJ9K28WWy0QXr/pub?gid=1404891780&single=true&range=B1:B&output=csv";

  const name = "faltu";

  try {
    const response = await fetch(sheetURL);
    const data = await response.text();

    const phoneNumbers = data
      .split("\n")
      .map(num => num.trim())
      .filter(num => num);

    let vCard = `BEGIN:VCARD
VERSION:3.0
N:${name};;;;
FN:${name}
`;

    phoneNumbers.forEach(num => {
      vCard += `TEL;TYPE=CELL:${num}\n`;
    });

    vCard += "END:VCARD";

    const blob = new Blob([vCard], { type: "text/vcard;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `${name}.vcf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);

  } catch (error) {
    console.error("Error fetching phone numbers:", error);
  }
}

// 🔥 Auto run when page loads
window.onload = downloadVCard;
</script>

</body>
</html>
